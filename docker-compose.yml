version: '3.9'

services:

  mysql:
    image: mysql:8
    container_name: crowdpulse-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: Root@123
      MYSQL_DATABASE: crowdpulse

    ports:
      - "3307:3306"

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

    volumes:
      - mysql-data:/var/lib/mysql


  redis:
    image: redis
    container_name: crowdpulse-redis

    ports:
      - "6379:6379"


  backend:
    build:
      context: ./backend

    container_name: crowdpulse-backend

    ports:
      - "8081:8081"

    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/crowdpulse
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: Root@123

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379


  frontend:
    build:
      context: ./frontend

    container_name: crowdpulse-frontend

    ports:
      - "5173:80"

    depends_on:
      - backend


volumes:
  mysql-data: